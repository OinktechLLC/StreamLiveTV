<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlayerJS - StreamLiveTV</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    #playerjs { width: 100%; height: 100%; }
    .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #fff; font-family: sans-serif; }
    video { width: 100%; height: 100%; object-fit: contain; background: #000; }
    audio { width: 100%; margin-top: 40vh; }
  </style>
</head>
<body>
  <div id="playerjs"></div>
  <script>
    function getParams() {
      var params = {};
      var search = location.search.substring(1) || location.hash.substring(1);
      if (!search && location.href.indexOf('html?') > -1) {
        search = location.href.substr(location.href.indexOf('html?') + 5);
      }
      var pairs = search.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var idx = pairs[i].indexOf('=');
        if (idx > -1) {
          params[pairs[i].substring(0, idx)] = decodeURIComponent(pairs[i].substring(idx + 1));
        }
      }
      return params;
    }

    var params = getParams();
    var config = { id: 'playerjs' };

    if (params.file) config.file = params.file;
    if (params.title) config.title = params.title;
    if (params.poster) config.poster = params.poster;
    if (params.logo) config.logo = params.logo;
    config.autoplay = (params.autoplay === '0' || params.autoplay === 'false') ? 0 : 1;

    // Playlist support
    if (params.playlist) {
      try { config.file = JSON.parse(params.playlist); } catch(e) { config.file = params.playlist; }
    }

    // Check if file is m3u/txt playlist that needs parsing
    function isPlaylistFile(url) {
      if (!url || typeof url !== 'string') return false;
      return /\.(m3u|m3u8|txt)(\?|$)/i.test(url);
    }

    function isM3u8Stream(url) {
      if (!url || typeof url !== 'string') return false;
      return /\.m3u8(\?|$)/i.test(url);
    }

    // Parse m3u/txt playlist into array of stream URLs
    function parsePlaylist(text) {
      var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l && !l.startsWith('#'); });
      return lines.filter(function(l) { return l.startsWith('http') || l.startsWith('/'); });
    }

    // HLS playback using native video or hls.js-like approach
    function playHLS(url, videoEl) {
      // Try native first (Safari)
      if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
        videoEl.src = url;
        videoEl.play().catch(function(){});
        return;
      }
      // Fallback: just set src and hope browser handles it
      videoEl.src = url;
      videoEl.play().catch(function(){});
    }

    // Sequential playlist player
    function PlaylistPlayer(urls, container) {
      var self = this;
      self.urls = urls;
      self.index = 0;
      self.container = container;

      var video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.playsInline = true;
      video.style.cssText = 'width:100%;height:100%;object-fit:contain;';
      container.innerHTML = '';
      container.appendChild(video);
      self.video = video;

      video.addEventListener('ended', function() {
        self.index = (self.index + 1) % self.urls.length;
        self.play();
      });

      video.addEventListener('error', function() {
        // Skip to next on error after 3 seconds
        setTimeout(function() {
          self.index = (self.index + 1) % self.urls.length;
          self.play();
        }, 3000);
      });

      self.play = function() {
        var url = self.urls[self.index];
        if (isM3u8Stream(url)) {
          playHLS(url, self.video);
        } else {
          self.video.src = url;
          self.video.play().catch(function(){});
        }
      };

      self.play();
    }

    function initPlayer() {
      var container = document.getElementById('playerjs');
      var fileStr = typeof config.file === 'string' ? config.file : '';

      // If it's a playlist file (m3u/txt), fetch and parse it
      if (fileStr && isPlaylistFile(fileStr) && !isM3u8Stream(fileStr)) {
        container.innerHTML = '<div class="loading">Загрузка плейлиста...</div>';
        fetch(fileStr)
          .then(function(r) { return r.text(); })
          .then(function(text) {
            var urls = parsePlaylist(text);
            if (urls.length > 0) {
              new PlaylistPlayer(urls, container);
            } else {
              // Maybe it's a single stream URL in the file
              container.innerHTML = '<video src="' + fileStr + '" controls autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>';
            }
          })
          .catch(function() {
            container.innerHTML = '<video src="' + fileStr + '" controls autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>';
          });
        return;
      }

      // Try PlayerJS library first
      if (typeof Playerjs !== 'undefined') {
        try {
          new Playerjs(config);
          return;
        } catch(e) {
          console.warn('PlayerJS init error:', e);
        }
      }

      // Fallback: native player
      if (fileStr) {
        if (fileStr.match(/\.(mp3|wav|ogg|aac)(\?|$)/i)) {
          container.innerHTML = '<audio src="' + fileStr + '" controls autoplay style="width:100%;margin-top:40vh;"></audio>';
        } else if (isM3u8Stream(fileStr)) {
          var v = document.createElement('video');
          v.controls = true;
          v.autoplay = true;
          v.playsInline = true;
          v.style.cssText = 'width:100%;height:100%;object-fit:contain;';
          container.innerHTML = '';
          container.appendChild(v);
          playHLS(fileStr, v);
        } else {
          container.innerHTML = '<video src="' + fileStr + '" controls autoplay playsinline style="width:100%;height:100%;object-fit:contain;"></video>';
        }
      } else {
        container.innerHTML = '<div class="loading">Нет источника медиа</div>';
      }
    }

    // Load local playerjs.js first
    var script = document.createElement('script');
    script.src = '/playerjs.js';
    script.onload = function() { initPlayer(); };
    script.onerror = function() {
      // Fallback to CDN
      var s2 = document.createElement('script');
      s2.src = 'https://oinktech.github.io/cdnplayerjs/playerjs.js';
      s2.onload = function() { initPlayer(); };
      s2.onerror = function() { initPlayer(); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(script);
  </script>
</body>
</html>
